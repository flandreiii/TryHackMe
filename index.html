<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --surface: #f7f7f7; --border: #e8e8e8;
      --text: #111111; --muted: #999999; --accent: #111111; --danger: #e03030;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }

    /* LOGIN */
    #login-screen {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #fff; z-index: 100; transition: opacity 0.5s ease;
    }
    #login-screen.hidden { opacity: 0; pointer-events: none; }
    .login-box { width: min(380px, 90vw); animation: fadeUp 0.6s ease both; text-align: center; }
    .login-logo { font-size: 13px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 40px; }
    .login-title { font-size: 26px; font-weight: 600; margin-bottom: 32px; letter-spacing: -0.02em; }
    .input-wrap { margin-bottom: 12px; }
    .input-wrap input {
      width: 100%; border: 1.5px solid var(--border); background: var(--bg); color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 14px; padding: 13px 16px; outline: none;
      border-radius: 6px; transition: border-color 0.2s; text-align: center; letter-spacing: 0.05em;
    }
    .input-wrap input:focus { border-color: var(--accent); }
    .input-wrap input.error { border-color: var(--danger); animation: shake 0.35s ease; }
    .error-msg { font-size: 12px; color: var(--danger); margin-bottom: 12px; min-height: 18px; font-family: 'DM Mono', monospace; }
    .login-btn {
      width: 100%; background: var(--accent); color: #fff; font-family: 'DM Sans', sans-serif;
      font-weight: 600; font-size: 14px; border: none; padding: 14px; border-radius: 6px;
      cursor: pointer; transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.8; }

    /* APP */
    #app { display: none; }
    #app.visible { display: block; animation: fadeUp 0.5s ease both; }

    header {
      border-bottom: 1px solid var(--border); padding: 18px 40px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px); z-index: 50;
    }
    .logo { font-size: 15px; font-weight: 600; }
    .logout-btn {
      font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
      background: none; border: 1px solid var(--border); padding: 7px 14px;
      border-radius: 5px; cursor: pointer; transition: all 0.2s;
    }
    .logout-btn:hover { color: var(--danger); border-color: var(--danger); }

    .container { max-width: 860px; margin: 0 auto; padding: 48px 24px; }
    .section { margin-bottom: 52px; }
    .section-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }

    /* STORAGE BAR */
    .storage-bar-wrap { margin-bottom: 32px; }
    .storage-info { display: flex; justify-content: space-between; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); margin-bottom: 6px; }
    .storage-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .storage-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
    .storage-bar-fill.warn { background: #e07a00; }
    .storage-bar-fill.full { background: var(--danger); }

    /* UPLOAD */
    .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
    .upload-card {
      border: 1.5px dashed var(--border); border-radius: 8px; padding: 28px 20px;
      text-align: center; cursor: pointer; position: relative; overflow: hidden;
      transition: border-color 0.2s, background 0.2s;
    }
    .upload-card:hover { border-color: #aaa; background: var(--surface); }
    .upload-card .icon { font-size: 24px; margin-bottom: 10px; }
    .upload-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .upload-card p { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
    .upload-card input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    /* GALLERY */
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    .gallery-item {
      aspect-ratio: 4/3; border-radius: 6px; overflow: hidden;
      position: relative; background: var(--surface); border: 1px solid var(--border);
    }
    .gallery-item img, .gallery-item video { width:100%; height:100%; object-fit:cover; display:block; }
    .gallery-item .remove-btn {
      position: absolute; top: 6px; right: 6px; background: rgba(255,255,255,0.92);
      color: var(--danger); border: none; width: 24px; height: 24px; border-radius: 50%;
      cursor: pointer; font-size: 12px; display: none; align-items: center;
      justify-content: center; font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }
    .gallery-item:hover .remove-btn { display: flex; }
    .gallery-item .file-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.45); color: #fff;
      font-size: 10px; font-family: 'DM Mono', monospace;
      padding: 4px 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* CODE */
    .code-editor {
      width: 100%; min-height: 180px; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px;
      padding: 18px; outline: none; resize: vertical; line-height: 1.7; transition: border-color 0.2s;
    }
    .code-editor:focus { border-color: #aaa; }
    .code-meta { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .code-meta input {
      flex: 1; min-width: 160px; background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 6px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px;
      padding: 10px 14px; outline: none; transition: border-color 0.2s;
    }
    .code-meta input:focus { border-color: #aaa; }
    .publish-btn {
      background: var(--accent); color: #fff; font-family: 'DM Sans', sans-serif;
      font-weight: 600; font-size: 13px; border: none; padding: 10px 24px;
      border-radius: 6px; cursor: pointer; transition: opacity 0.2s;
    }
    .publish-btn:hover { opacity: 0.75; }

    /* CODE CARDS */
    .code-cards { display: flex; flex-direction: column; gap: 12px; }
    .code-card { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .code-card-header {
      padding: 12px 18px; display: flex; align-items: center;
      justify-content: space-between; background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .code-card-title { font-size: 13px; font-weight: 600; }
    .code-card-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
    .code-card pre { padding: 18px; overflow-x: auto; font-family: 'DM Mono', monospace; font-size: 12px; line-height: 1.75; color: #333; }
    .code-card-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; transition: color 0.2s; margin-left: 12px; }
    .code-card-remove:hover { color: var(--danger); }

    .empty-state { text-align: center; padding: 36px; color: var(--muted); font-size: 13px; border: 1.5px dashed var(--border); border-radius: 8px; }

    #toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--text); color: #fff;
      font-size: 12px; font-family: 'DM Mono', monospace; padding: 11px 18px;
      border-radius: 6px; z-index: 200; transform: translateY(60px); opacity: 0;
      transition: all 0.3s ease; pointer-events: none;
    }
    #toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      .container { padding: 32px 16px; }
      .upload-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Portfolio</div>
    <h1 class="login-title">Welcome back</h1>
    <div class="input-wrap">
      <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password"/>
    </div>
    <div class="error-msg" id="error-msg"></div>
    <button class="login-btn" onclick="tryLogin()">Continue</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="logo">My Portfolio</div>
    <button class="logout-btn" onclick="logout()">log out</button>
  </header>
  <div class="container">

    <!-- STORAGE -->
    <div class="storage-bar-wrap">
      <div class="storage-info">
        <span>Storage used</span>
        <span id="storage-text">0 MB</span>
      </div>
      <div class="storage-bar"><div class="storage-bar-fill" id="storage-fill" style="width:0%"></div></div>
    </div>

    <!-- MEDIA -->
    <div class="section">
      <div class="section-label">Upload Media</div>
      <div class="upload-grid">
        <div class="upload-card">
          <div class="icon">🖼️</div>
          <h3>Photos</h3>
          <p>jpg · png · gif · webp</p>
          <input type="file" accept="image/*" multiple onchange="handleMedia(event,'image')"/>
        </div>
        <div class="upload-card">
          <div class="icon">🎬</div>
          <h3>Videos</h3>
          <p>mp4 · mov · webm</p>
          <input type="file" accept="video/*" multiple onchange="handleMedia(event,'video')"/>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Gallery</div>
      <div class="gallery" id="gallery"><div class="empty-state">No media yet.</div></div>
    </div>

    <!-- CODE -->
    <div class="section">
      <div class="section-label">Publish Python Project</div>
      <textarea class="code-editor" id="code-input" placeholder="# Paste your Python code here..."></textarea>
      <div class="code-meta">
        <input type="text" id="code-title" placeholder="Project name"/>
        <button class="publish-btn" onclick="publishCode()">Publish</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Projects</div>
      <div class="code-cards" id="code-cards"><div class="empty-state">No projects yet.</div></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
  const CORRECT = "laki224_90!Not";
  let mediaItems = [];
  let projects = [];

  // ── AUTH ──
  function tryLogin() {
    const val = document.getElementById('pw-input').value;
    const inp = document.getElementById('pw-input');
    const err = document.getElementById('error-msg');
    if (val === CORRECT) {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app').classList.add('visible');
      err.textContent = '';
      loadData();
    } else {
      inp.classList.add('error');
      err.textContent = 'Incorrect password.';
      setTimeout(() => inp.classList.remove('error'), 400);
      inp.value = '';
    }
  }

  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin();
  });

  function logout() {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('app').classList.remove('visible');
    document.getElementById('pw-input').value = '';
  }

  // ── STORAGE ──
  function saveData() {
    try {
      localStorage.setItem('pf_media', JSON.stringify(mediaItems));
      localStorage.setItem('pf_projects', JSON.stringify(projects));
      updateStorageBar();
    } catch(e) {
      showToast('Storage full! Delete some files.');
    }
  }

  function loadData() {
    try {
      const m = localStorage.getItem('pf_media');
      const p = localStorage.getItem('pf_projects');
      mediaItems = m ? JSON.parse(m) : [];
      projects   = p ? JSON.parse(p) : [];
    } catch(e) {
      mediaItems = []; projects = [];
    }
    renderGallery();
    renderProjects();
    updateStorageBar();
  }

  function updateStorageBar() {
    try {
      let total = 0;
      for (let k in localStorage) {
        if (localStorage.hasOwnProperty(k)) total += localStorage[k].length * 2;
      }
      const mb = (total / 1024 / 1024).toFixed(1);
      const pct = Math.min((total / 1024 / 1024 / 5) * 100, 100); // ~5MB limit
      document.getElementById('storage-text').textContent = mb + ' MB / ~5 MB';
      const fill = document.getElementById('storage-fill');
      fill.style.width = pct + '%';
      fill.className = 'storage-bar-fill' + (pct > 90 ? ' full' : pct > 70 ? ' warn' : '');
    } catch(e) {}
  }

  // ── MEDIA ──
  function handleMedia(e, type) {
    Array.from(e.target.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        mediaItems.push({ src: ev.target.result, type, name: file.name });
        saveData();
        renderGallery();
        showToast('Uploaded!');
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  }

  function renderGallery() {
    const g = document.getElementById('gallery');
    if (!mediaItems.length) { g.innerHTML = '<div class="empty-state">No media yet.</div>'; return; }
    g.innerHTML = mediaItems.map((item, i) => `
      <div class="gallery-item">
        ${item.type === 'image'
          ? `<img src="${item.src}" alt="${esc(item.name)}"/>`
          : `<video src="${item.src}" muted loop playsinline></video>`}
        <div class="file-label">${esc(item.name)}</div>
        <button class="remove-btn" onclick="removeMedia(${i})">✕</button>
      </div>`).join('');
  }

  function removeMedia(i) {
    mediaItems.splice(i, 1);
    saveData();
    renderGallery();
    showToast('Removed.');
  }

  // ── CODE ──
  function publishCode() {
    const code = document.getElementById('code-input').value.trim();
    const title = document.getElementById('code-title').value.trim() || 'Untitled';
    if (!code) { showToast('No code to publish.'); return; }
    projects.unshift({ title, code, date: new Date().toLocaleDateString() });
    document.getElementById('code-input').value = '';
    document.getElementById('code-title').value = '';
    saveData();
    renderProjects();
    showToast('Published!');
  }

  function renderProjects() {
    const c = document.getElementById('code-cards');
    if (!projects.length) { c.innerHTML = '<div class="empty-state">No projects yet.</div>'; return; }
    c.innerHTML = projects.map((p, i) => `
      <div class="code-card">
        <div class="code-card-header">
          <span class="code-card-title">${esc(p.title)}</span>
          <div style="display:flex;align-items:center">
            <span class="code-card-meta">Python · ${p.date}</span>
            <button class="code-card-remove" onclick="removeProject(${i})">✕</button>
          </div>
        </div>
        <pre>${esc(p.code)}</pre>
      </div>`).join('');
  }

  function removeProject(i) {
    projects.splice(i, 1);
    saveData();
    renderProjects();
    showToast('Removed.');
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
